# MCQ Battle Platform Nginx Configuration File
# Save this file to /etc/nginx/sites-available/mcq-portal and symlink to /etc/nginx/sites-enabled/

# HTTP - Primary Production Block (Port 80)
# Serves the static frontend directly and proxies API calls to Gunicorn
server {
    listen 80;
    listen [::]:80;
    server_name mcq-platform.duckdns.org;

    # Security Headers to prevent attacks (XSS, Clickjacking, MIME-sniffing)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' https: http: 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https:;" always;

    # Root Directory for MCQ Battle Platform Static Frontend
    root /home/ubuntu/mcq-portal/frontend;
    index index.html;

    # Max upload file size limit
    client_max_body_size 10M;

    # Gzip Compression settings
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # Static Frontend File Routing & Index Fallback
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Cache Control for Static Assets (CSS, JS, Images, Fonts)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # API Proxy Routing to Flask Gunicorn Backend
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        
        # Proxy Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep-Alive Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Prevent access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

